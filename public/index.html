<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Todea — Cloud Native Infrastructure Consulting</title>
    <meta name="description" content="Todea is a Seoul-based cloud native infrastructure consultancy helping enterprises build resilient platforms on Kubernetes." />
    <meta name="naver-site-verification" content="d62232868655b0d90718afa157ba294ee71dd601" />
    <meta name="robots" content="noindex" />
    <link rel="canonical" href="https://todea.co.kr/en" />
    <link rel="alternate" hreflang="en" href="https://todea.co.kr/en" />
    <link rel="alternate" hreflang="ko" href="https://todea.co.kr/ko" />
    <link rel="alternate" hreflang="ja" href="https://todea.co.kr/ja" />
    <link rel="alternate" hreflang="zh" href="https://todea.co.kr/zh" />
    <link rel="alternate" hreflang="x-default" href="https://todea.co.kr/en" />
    <script>
      const supported = ['en', 'ko', 'ja', 'zh'];
      const langs = navigator.languages || [navigator.language];
      let match = 'en';
      for (const lang of langs) {
        const code = lang.split('-')[0].toLowerCase();
        if (supported.includes(code)) {
          match = code;
          break;
        }
      }
      window.location.replace('/' + match);
    </script>
    <noscript>
      <meta http-equiv="refresh" content="0;url=/en" />
    </noscript>
  </head>
  <body>
    <p>Redirecting&hellip; <a href="/en">Click here</a> if not redirected.</p>
  </body>
