<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f10"/>
      <stop offset="100%" stop-color="#1a1f20"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="450" rx="800" ry="500" fill="url(#glow)"/>

  <!-- Flow lines: inbound requests -> policy gate -> admitted -->
  <g stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.2" fill="none">
    <line x1="320" y1="250" x2="780" y2="280"/>
    <line x1="320" y1="370" x2="780" y2="380"/>
    <line x1="320" y1="490" x2="780" y2="480"/>
    <line x1="320" y1="610" x2="780" y2="580"/>
    <line x1="320" y1="730" x2="780" y2="680"/>

    <line x1="820" y1="280" x2="1280" y2="250"/>
    <line x1="820" y1="380" x2="1280" y2="370"/>
    <line x1="820" y1="480" x2="1280" y2="490"/>
    <line x1="820" y1="580" x2="1280" y2="610"/>
    <line x1="820" y1="680" x2="1280" y2="730"/>

    <line x1="780" y1="280" x2="780" y2="680"/>
    <line x1="820" y1="280" x2="820" y2="680"/>
  </g>

  <!-- Policy gate column (thicker rings) -->
  <g stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.6" fill="none">
    <circle cx="800" cy="280" r="22"/>
    <circle cx="800" cy="380" r="22"/>
    <circle cx="800" cy="480" r="22"/>
    <circle cx="800" cy="580" r="22"/>
    <circle cx="800" cy="680" r="22"/>
  </g>

  <!-- Inbound and outbound envelopes (lighter rings) -->
  <g stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.2" fill="none">
    <circle cx="320" cy="250" r="18"/>
    <circle cx="320" cy="370" r="18"/>
    <circle cx="320" cy="490" r="18"/>
    <circle cx="320" cy="610" r="18"/>
    <circle cx="320" cy="730" r="18"/>

    <circle cx="1280" cy="250" r="18"/>
    <circle cx="1280" cy="370" r="18"/>
    <circle cx="1280" cy="490" r="18"/>
    <circle cx="1280" cy="610" r="18"/>
    <circle cx="1280" cy="730" r="18"/>
  </g>

  <!-- Object cores -->
  <g fill="#ffffff" fill-opacity="0.85">
    <circle cx="320" cy="250" r="7"/>
    <circle cx="320" cy="370" r="7"/>
    <circle cx="320" cy="490" r="7"/>
    <circle cx="320" cy="610" r="7"/>
    <circle cx="320" cy="730" r="7"/>

    <circle cx="800" cy="280" r="9"/>
    <circle cx="800" cy="380" r="9"/>
    <circle cx="800" cy="480" r="9"/>
    <circle cx="800" cy="580" r="9"/>
    <circle cx="800" cy="680" r="9"/>

    <circle cx="1280" cy="250" r="7"/>
    <circle cx="1280" cy="370" r="7"/>
    <circle cx="1280" cy="490" r="7"/>
    <circle cx="1280" cy="610" r="7"/>
    <circle cx="1280" cy="730" r="7"/>
  </g>

  <text x="100" y="820" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="48" fill="#ffffff" letter-spacing="-1">Kyverno</text>
  <text x="100" y="865" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="20" fill="#a3a3a3" letter-spacing="2">TODEA · CLOUD NATIVE ENGINEERING</text>
</svg>
